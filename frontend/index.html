<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supply Chain AI Assistant</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f4f7fb; }
      .app { max-width: 850px; margin: 40px auto; background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,.08); }
      h1 { margin-top: 0; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      input, select, textarea, button { width: 100%; padding: 10px; margin-top: 6px; border-radius: 8px; border: 1px solid #c9d3e0; }
      button { cursor: pointer; background: #2154d8; color: white; border: none; }
      .card { background: #f9fbff; border: 1px solid #e3ebf5; padding: 14px; border-radius: 10px; margin-top: 16px; }
      .muted { color: #4f5d74; font-size: 14px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      function App() {
        const [question, setQuestion] = React.useState("How does lead time impact inventory?");
        const [answer, setAnswer] = React.useState("");
        const [refs, setRefs] = React.useState([]);
        const [form, setForm] = React.useState({
          inventory_level: 1200,
          lead_time_days: 14,
          historical_weekly_demand: 550,
          supplier_reliability_score: 0.88,
        });
        const [prediction, setPrediction] = React.useState(null);

        async function askQuestion() {
          const res = await fetch('/qa', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question }),
          });
          const data = await res.json();
          setAnswer(data.answer);
          setRefs(data.references || []);
        }

        async function makePrediction() {
          const res = await fetch('/predict', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(form),
          });
          const data = await res.json();
          setPrediction(data);
        }

        return (
          <div className="app">
            <h1>Supply Chain AI Solution</h1>
            <p className="muted">Ask supply-chain questions and generate a next-week demand prediction.</p>

            <div className="card">
              <h3>LLM Layer (Guardrailed Q&A)</h3>
              <textarea rows="3" value={question} onChange={(e) => setQuestion(e.target.value)} />
              <button onClick={askQuestion}>Ask</button>
              {answer && <p><strong>Answer:</strong> {answer}</p>}
              {refs.length > 0 && <p className="muted">Refs: {refs.join(', ')}</p>}
            </div>

            <div className="card">
              <h3>MLOps Layer (Demand Prediction)</h3>
              <div className="grid">
                {Object.keys(form).map((key) => (
                  <label key={key}>{key}
                    <input
                      type="number"
                      step="0.01"
                      value={form[key]}
                      onChange={(e) => setForm({ ...form, [key]: Number(e.target.value) })}
                    />
                  </label>
                ))}
              </div>
              <button onClick={makePrediction}>Predict</button>
              {prediction && <p><strong>Predicted next-week demand:</strong> {prediction.predicted_next_week_demand} (model {prediction.model_version})</p>}
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
